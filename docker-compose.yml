version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: healstack_postgres

    restart: always

    environment:
      POSTGRES_USER: healstack
      POSTGRES_PASSWORD: healstackpassword
      POSTGRES_DB: healstack_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: